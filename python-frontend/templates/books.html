{% extends 'base.html' %}

{% block content %}
<h1>Books</h1>

<form class="mb-4" action="{{ url_for('search_books') }}" method="GET">
    <div class="input-group">
        <input type="text" class="form-control" name="query" placeholder="Search books..." value="{{ query if query }}">
        <button class="btn btn-primary" type="submit">Search</button>
    </div>
</form>

<div class="row">
    {% for book in books %}
    <div class="col-md-4 mb-4">
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">{{ book.title }}</h5>
                <h6 class="card-subtitle mb-2 text-muted">{{ book.author }}</h6>
                <p class="card-text">
                    <strong>ISBN:</strong> {{ book.isbn }}<br>
                    <strong>Category:</strong> {{ book.category }}<br>
                    <strong>Available:</strong> {{ "Yes" if book.available else "No" }}
                </p>
                <p class="card-text">{{ book.description }}</p>
                <a href="#" class="btn btn-primary">Details</a>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
