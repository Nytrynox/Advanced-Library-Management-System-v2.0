{% extends 'base.html' %}

{% block content %}
<h1>Welcome to Library Management System</h1>
<div class="row mt-4">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">Books</h5>
                <p class="card-text">Browse and manage books in the library.</p>
                <a href="/books" class="btn btn-primary">View Books</a>
            </div>
        </div>
    </div>
    <div class="col-md-6">
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">Add New Book</h5>
                <p class="card-text">Add a new book to the library collection.</p>
                <a href="/books/add" class="btn btn-success">Add Book</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
