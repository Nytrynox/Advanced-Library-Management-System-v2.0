version: '3.8'

services:
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  backend:
    build:
      context: ./java-backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATA_MONGODB_HOST=mongodb
      - SPRING_DATA_MONGODB_PORT=27017
      - SPRING_DATA_MONGODB_DATABASE=library_db
    depends_on:
      - mongodb

  frontend:
    build:
      context: ./python-frontend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - API_URL=http://backend:8080/api
      - FLASK_ENV=development
    depends_on:
      - backend

volumes:
  mongodb_data:
